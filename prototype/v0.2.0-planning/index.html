<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JUGO v0.2.0 项目管理首页</title>
    <script>
      const savedTheme = localStorage.getItem('jugo-theme')
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
      document.documentElement.dataset.theme = savedTheme || (prefersDark ? 'dark' : 'light')
    </script>
    <link rel="stylesheet" href="./src/styles/theme.css" />
    <link rel="stylesheet" href="./src/styles/project-dashboard.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="JUGO 项目首页">
          <span class="brand-mark">J</span>
          <span>
            <strong>JUGO</strong>
            <small>v0.2.0-planning</small>
          </span>
        </a>

        <nav class="main-nav" aria-label="主导航">
          <a class="nav-item is-active" href="/">项目</a>
          <button class="nav-item" type="button" data-toast="世界观模板库将在后续原型阶段接入">世界观模板库</button>
          <button class="nav-item" type="button" data-toast="帮助中心将在需求评审稿确认后接入">帮助中心</button>
        </nav>

        <div class="topbar-actions">
          <div class="state-switch" aria-label="演示状态切换">
            <button class="state-option is-active" type="button" data-state="projects">有项目</button>
            <button class="state-option" type="button" data-state="empty">空白态</button>
          </div>
          <button class="icon-button" type="button" id="themeToggle" aria-label="切换主题">
            <span class="theme-icon" aria-hidden="true">☼</span>
            <span class="theme-label">日间</span>
          </button>
          <button class="primary-button" type="button" data-open-create>新建项目</button>
        </div>
      </header>

      <main class="dashboard">
        <section class="dashboard-heading">
          <div>
            <p class="eyebrow">项目管理工作台</p>
            <h1>创作项目</h1>
            <p class="heading-copy">从项目入口选择线性单结局或多分支多结局模板，进入世界观、时序、分支和节拍的评审链路。</p>
          </div>
          <div class="summary-strip" aria-label="项目统计">
            <div>
              <strong id="summaryTotal">0</strong>
              <span>项目</span>
            </div>
            <div>
              <strong id="summaryLinear">0</strong>
              <span>线性</span>
            </div>
            <div>
              <strong id="summaryBranching">0</strong>
              <span>多分支</span>
            </div>
          </div>
        </section>

        <section class="project-section" id="projectsState" aria-label="项目列表">
          <div class="toolbar">
            <div class="search-box">
              <span aria-hidden="true">⌕</span>
              <input id="projectSearch" type="search" placeholder="搜索项目、负责人或标签" />
            </div>
            <select id="typeFilter" aria-label="按项目类型筛选">
              <option value="all">全部类型</option>
              <option value="linear">线性单结局</option>
              <option value="branching">多分支多结局</option>
            </select>
            <select id="ownerFilter" aria-label="按负责人筛选">
              <option value="all">全部负责人</option>
            </select>
          </div>

          <div class="project-grid" id="projectGrid"></div>
        </section>

        <section class="empty-state is-hidden" id="emptyState" aria-label="空白项目引导">
          <div class="empty-panel">
            <div class="empty-copy">
              <p class="eyebrow">新账号</p>
              <h2>开始创作你的小说 / 互动剧本</h2>
              <p>选择标准化模板后，系统将初始化对应的世界观表单、评审画布和节拍结构。</p>
              <button class="primary-button large" type="button" data-open-create>新建项目</button>
            </div>
            <div class="flow-grid" aria-label="创作流程">
              <div class="flow-card">
                <span>01</span>
                <strong>线性单结局</strong>
                <p>世界观 → 矩阵时序 → 节拍板</p>
              </div>
              <div class="flow-card">
                <span>02</span>
                <strong>多分支多结局</strong>
                <p>世界观 → 分支树 → 矩阵时序 → 节拍板</p>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-backdrop is-hidden" id="createModal" role="dialog" aria-modal="true" aria-labelledby="createTitle">
      <div class="modal">
        <header class="modal-header">
          <div>
            <p class="eyebrow">新建项目</p>
            <h2 id="createTitle">选择创作模板</h2>
          </div>
          <button class="icon-only" type="button" data-close-modal aria-label="关闭">×</button>
        </header>
        <div class="template-grid">
          <button class="template-card" type="button" data-template="linear">
            <span class="template-type">模板 1</span>
            <strong>线性单结局</strong>
            <p>适合影视、网文、短剧等线性叙事。自动隐藏分支树，仅保留世界观、矩阵时序和节拍板。</p>
            <span class="template-flow">世界观 → 矩阵时序 → 节拍板</span>
          </button>
          <button class="template-card" type="button" data-template="branching">
            <span class="template-type accent">模板 2</span>
            <strong>多分支多结局</strong>
            <p>适合互动小说、游戏叙事和多结局剧本。开放分支树、单分支筛选和任务分配。</p>
            <span class="template-flow">世界观 → 分支树 → 矩阵时序 → 节拍板</span>
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
